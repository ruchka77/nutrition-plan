<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <title>You VS You - מעקב שבועי</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="nav-link">⬅️ חזרה לתפריט</a>
        
        <h1>📊 מעקב שבועי</h1>
        
        <div class="week-navigation">
            <button class="week-nav-btn" onclick="changeWeek(-1)">◀️ שבוע קודם</button>
            <button class="current-week-btn" onclick="changeWeek(0)">השבוע הנוכחי</button>
            <button class="week-nav-btn" onclick="changeWeek(1)" id="nextWeekBtn">שבוע הבא ▶️</button>
        </div>
        
        <h1><span id="weekRange"></span></h1>
        
        <div class="summary-boxes">
            <div class="summary-box">
                <div class="label">סך הכל ארוחות</div>
                <div class="value" id="totalMeals">0</div>
            </div>
            <div class="summary-box">
                <div class="label">ממוצע יומי</div>
                <div class="value" id="avgMeals">0</div>
            </div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>יום</th>
                    <th>תאריך</th>
                    <th>ארוחות חלבון</th>
                    <th>ארוחות פחמימה</th>
                </tr>
            </thead>
            <tbody id="weeklyTable">
                <tr>
                    <td colspan="4" class="loading">טוען נתונים מהשרת...</td>
                </tr>
            </tbody>
        </table>
        
        <div class="footer-note">
            <strong>💡 טיפ:</strong> כל הנתונים נשמרים לצמיתות בשרת. אפשר לעבור בין שבועות כדי לראות את ההתקדמות לאורך זמן!
        </div>
    </div>

    <script>
        const API_URL = '/api/meals';
        let currentWeekOffset = 0; 
        
        function getWeekRange(offset = 0) {
            const today = new Date();
            const dayOfWeek = today.getDay();
            const start = new Date(today);
            start.setDate(today.getDate() - dayOfWeek + (offset * 7));
            start.setHours(0, 0, 0, 0);
            
            const end = new Date(start);
            end.setDate(start.getDate() + 6);
            end.setHours(23, 59, 59, 999);
            
            return { start, end };
        }

        function formatDate(date) {
            return date.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        const dayNames = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];

        function filterMealsByWeek(meals, weekStart, weekEnd) {
            return meals.filter(meal => {
                const mealDate = new Date(meal.date);
                return mealDate >= weekStart && mealDate <= weekEnd;
            });
        }

        function groupMealsByDay(meals) {
            const grouped = {};
            meals.forEach(meal => {
                const date = new Date(meal.date).toDateString();
                if (!grouped[date]) {
                    grouped[date] = { protein: [], carbs: [] };
                }
                if (meal.type === 'חלבון') {
                    grouped[date].protein.push(meal);
                } else {
                    grouped[date].carbs.push(meal);
                }
            });
            return grouped;
        }

        function changeWeek(offset) {
            if (offset === 0) {
                currentWeekOffset = 0; 
            } else {
                currentWeekOffset += offset;
            }
            
            const nextWeekBtn = document.getElementById('nextWeekBtn');
            if (currentWeekOffset >= 0) {
                nextWeekBtn.disabled = true;
                currentWeekOffset = 0;
            } else {
                nextWeekBtn.disabled = false;
            }
            
            renderWeeklyTable();
        }

        async function renderWeeklyTable() {
            const tbody = document.getElementById('weeklyTable');
            const googleToken = localStorage.getItem('google_token');
            
            if (!googleToken) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="error">
                            ⚠️ אינך מחובר. אנא חזור לעמוד הראשי והתחבר עם גוגל כדי לראות את הנתונים שלך.
                        </td>
                    </tr>
                `;
                return;
            }
            
            try {
                // 2מוסיפים את הטוקן לבקשת השליפה
                const response = await fetch(API_URL, {
                    headers: {
                        'Authorization': `Bearer ${googleToken}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Unauthorized or Server Error');
                }
                
                const allMeals = await response.json();
                
                const { start, end } = getWeekRange(currentWeekOffset);
                const weekMeals = filterMealsByWeek(allMeals, start, end);
                const groupedMeals = groupMealsByDay(weekMeals);
                
                const weekLabel = currentWeekOffset === 0 ? 'השבוע הנוכחי: ' : '';
                document.getElementById('weekRange').textContent = 
                    weekLabel + `${formatDate(start)} - ${formatDate(end)}`;
                
                tbody.innerHTML = '';
                
                let totalMeals = 0;
                
                for (let i = 0; i < 7; i++) {
                    const currentDay = new Date(start);
                    currentDay.setDate(start.getDate() + i);
                    const dayKey = currentDay.toDateString();
                    const dayData = groupedMeals[dayKey] || { protein: [], carbs: [] };
                    
                    totalMeals += dayData.protein.length + dayData.carbs.length;
                    
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="day-cell">${dayNames[i]}</td>
                        <td class="day-cell">${formatDate(currentDay)}</td>
                        <td class="meal-cell">
                            ${dayData.protein.length > 0 
                                ? dayData.protein.map(m => 
                                    `<div class="meal-item protein"><strong>${m.name}</strong> - ${m.weight}g</div>`
                                  ).join('')
                                : '<span class="empty-day">לא נרשמו ארוחות</span>'
                            }
                        </td>
                        <td class="meal-cell">
                            ${dayData.carbs.length > 0 
                                ? dayData.carbs.map(m => 
                                    `<div class="meal-item carbs"><strong>${m.name}</strong> - ${m.weight}g</div>`
                                  ).join('')
                                : '<span class="empty-day">לא נרשמו ארוחות</span>'
                            }
                        </td>
                    `;
                    tbody.appendChild(row);
                }
                
                document.getElementById('totalMeals').textContent = totalMeals;
                document.getElementById('avgMeals').textContent = (totalMeals / 7).toFixed(1);
                
            } catch (error) {
                console.error('Error fetching meals:', error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="error">
                            ⚠️ שגיאה בטעינת הנתונים (אולי התחברות פגה). אנא נסה להתחבר מחדש במסך הראשי.
                        </td>
                    </tr>
                `;
            }
        }

        renderWeeklyTable();
        
        setInterval(() => {
            if (currentWeekOffset === 0) {
                renderWeeklyTable();
            }
        }, 60000);
    </script>
</body>
</html>
